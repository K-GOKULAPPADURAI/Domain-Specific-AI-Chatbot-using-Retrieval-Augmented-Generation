services:
  - type: web
    name: devcansol-rag
    runtime: python
    region: oregon
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build &&
      rm -rf ../backend/static && cp -r dist ../backend/static &&
      cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: XAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: NODE_VERSION
        value: 20.11.0
